name: Publish to GitHub Pages

# Pages serves from the gh-pages branch; this keeps it in sync with main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: git push --force origin HEAD:gh-pages
